name: Docs

# 推送 main 且改动 docs/book/** 时:用 mdBook 构建用户指南并发布到 GitHub Pages
# (https://duncatzat.github.io/vigils/)。使用内置 GITHUB_TOKEN,无需 PAT。
on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个 Pages 部署,但不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.2"
      - name: Build book
        run: mdbook build docs/book
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
