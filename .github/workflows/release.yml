name: Release

# 推送 v* tag 时:创建 GitHub Release 并附带各平台产物
# (CLI 二进制 + 桌面安装包)。使用内置 GITHUB_TOKEN,无需 PAT。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. 创建（或复用）Release ───────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      # Release notes = English CHANGELOG section + a clearly-separated Chinese section
      # (never interleaved) + Downloads/footer. Single source of truth: the curated notes
      # live in CHANGELOG.md / CHANGELOG.zh-CN.md, not duplicated here.
      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          notes="$(mktemp)"
          # Extract the section under "## [<tag>]" up to the next "---" or next "## [" heading.
          # Literal index() matching avoids awk regex-metachar pitfalls with [ ] and dots.
          extract() {
            awk -v tag="$tag" '
              index($0, "## [" tag "]") == 1 { inblk=1; next }
              inblk && ($0 == "---" || index($0, "## [") == 1) { exit }
              inblk { print }
            ' "$1"
          }
          # English body (authoritative).
          extract CHANGELOG.md > "$notes" || true
          if [ ! -s "$notes" ]; then
            printf 'Vigils %s — a local-first control plane for AI agents.\n' "$tag" > "$notes"
          fi
          # Chinese as a clearly-separated section (never interleaved).
          zh="$(extract CHANGELOG.zh-CN.md 2>/dev/null || true)"
          if [ -n "$zh" ]; then
            { printf '\n---\n\n## 中文\n\n'; printf '%s\n' "$zh"; } >> "$notes"
          fi
          {
            printf '\n---\n\n'
            printf '%s\n\n' '### Downloads — which file do I want?'
            printf '%s\n' '- **Desktop app** (most users): the installer for your OS — Windows `Vigils_*_x64-setup.exe` (or `.msi`), macOS `Vigils_*.dmg`, Linux `.AppImage` / `.deb` / `.rpm`. Gives you the GUI: Activity Feed, Approval Queue, Server Registry.'
            printf '%s\n' '- **CLI gateway** (put Vigils in front of an AI agent — Claude Code / Codex / Cursor / Zed): `vigils-cli-<platform>` (contains `vigil-hub` + `vigil-native-host`). This is the MCP proxy your agent connects to.'
            printf '%s\n' '- **Browser extension** (guard pasting/typing secrets into AI web apps, Chrome MV3): `vigils-chrome-extension.zip` — unzip, then load unpacked at `chrome://extensions`.'
            printf '%s\n\n' '- The `.sig` and `Vigils.app.tar.gz` files are desktop auto-updater artifacts — you do not need to download them.'
            printf '%s\n\n' 'New here? Full setup & agent-integration guide: https://duncatzat.github.io/vigils'
            printf '%s\n\n' 'Early releases are unsigned; your OS may show a Gatekeeper / SmartScreen prompt on first run.'
            printf '%s\n' 'Apache-2.0 · https://vigils.ai · [Full changelog](https://github.com/duncatzat/vigils/blob/main/CHANGELOG.md)'
          } >> "$notes"
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Vigils ${{ steps.resolve.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: ${{ steps.notes.outputs.path }}

  # ── 2. CLI 二进制（3 平台）───────────────────────────────────────────
  cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # plat = 面向用户的友好平台名(替代 Rust target triple,新用户更易辨认下载哪个)
          # ★ linux CLI 用 **ubuntu-22.04**(glibc 2.35)而非 ubuntu-latest(24.04=glibc 2.39):
          #   真机 E2E(D15)发现 ubuntu-latest 产物要求 GLIBC_2.39,在 Ubuntu 22.04 LTS / Debian 12 /
          #   多数现行发行版上直接 `version GLIBC_2.39 not found` 跑不起来 = 采用毒药。22.04 把 glibc 地板
          #   拉到 2.35,覆盖 22.04 LTS(支持到 2027)+ 24.04 + Debian 12 等主流。更老(20.04/RHEL8)的
          #   通用覆盖留 musl 静态(future)。CLI 无 GUI 依赖,在 22.04 构建无碍(desktop 因 webkit2gtk-4.1
          #   仍须 24.04,见 desktop job)。
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  plat: linux-x64,   suffix: "",     archive: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,      plat: macos-arm64, suffix: "",     archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    plat: windows-x64, suffix: ".exe", archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (keyring / secret-service)
        # robust:按 runner OS 判定而非钉死版本字符串(改 runner 版本不漏装 = 不静默断 keyring 链)。
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev

      - name: Build CLI binaries
        run: cargo build --release --bin vigil-hub -p vigil-hub-cli --bin vigil-native-host -p vigil-native-host

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          mkdir -p dist
          tar -C target/release -czf "dist/vigils-cli-${{ matrix.plat }}.tar.gz" vigil-hub vigil-native-host
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/vigil-hub.exe, target/release/vigil-native-host.exe -DestinationPath "dist/vigils-cli-${{ matrix.plat }}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: dist/vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}

  # ── 3. 桌面安装包（3 平台,Tauri bundle）─────────────────────────────
  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  plat: linux-x86_64 }
          - { os: macos-latest,   plat: darwin-aarch64 }
          - { os: windows-latest, plat: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    # OTA updater signing — set repo secret TAURI_SIGNING_PRIVATE_KEY (content of the
    # Tauri minisign private key) to produce signed updater artifacts + per-platform
    # manifests. Absent → plain installers, no OTA; the release still succeeds (the
    # updater steps below are guarded on the key being present).
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libdbus-1-dev pkg-config libssl-dev

      # 显式 cargo tauri build —— 不用 tauri-action 的前端自动探测(projectPath
      # apps/desktop 无 package.json,前端在 ui/,自动 install 会失败)。
      # beforeBuildCommand 已自包含(npm --prefix ui),tauri build 会调它构建前端。
      - name: Build frontend (beforeBuildCommand is empty — build dist explicitly)
        working-directory: apps/desktop/ui
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # createUpdaterArtifacts is enabled ONLY when the signing key is present (otherwise
      # the build would fail demanding a key). Two guarded steps keep no-secret releases
      # working unchanged. shell: bash for uniform --config JSON quoting across OSes.
      - name: Build desktop bundles (signed + updater artifacts)
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        working-directory: apps/desktop
        shell: bash
        run: cargo tauri build --features gui --config '{"bundle":{"createUpdaterArtifacts":true}}'

      - name: Build desktop bundles (no signing key — plain installers)
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        working-directory: apps/desktop
        run: cargo tauri build --features gui

      # always(): 单个 bundle target(如某平台 rpm)失败不应拖垮整步,
      # 让已成功产出的其他安装包仍能上传(matrix 已 fail-fast: false)。
      - name: Upload desktop bundles
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*-setup.exe.sig
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app.tar.gz
            target/release/bundle/**/*.app.tar.gz.sig
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.AppImage.sig
            target/release/bundle/**/*.AppImage.tar.gz
            target/release/bundle/**/*.AppImage.tar.gz.sig

      # OTA: generate this platform's updater manifest (latest-<plat>.json) pointing at the
      # signed artifact's GitHub release URL, then upload it as a release asset. The
      # vigils.ai mirror's ota-sync pulls these → /desktop-updates/<plat>/latest.json.
      - name: Generate OTA updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: bash
        run: node scripts/gen-updater-manifest.mjs "${{ needs.create-release.outputs.tag }}" "${{ matrix.plat }}" target/release/bundle "${{ github.repository }}" "Vigils ${{ needs.create-release.outputs.tag }}"

      - name: Upload OTA updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: latest-${{ matrix.plat }}.json

  # ── 4. Chrome MV3 扩展（zip,供用户 load unpacked）──────────────────────
  extension:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Chrome MV3 extension
        run: |
          set -e
          mkdir -p dist
          # 顶层保留 chrome-mv3/ 便于解压后直接 load unpacked;排除点文件 / node_modules
          (cd extensions && zip -r "../dist/vigils-chrome-extension.zip" chrome-mv3 -x '*/.*' '*/node_modules/*')
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: dist/vigils-chrome-extension.zip
