name: Release

# 推送 v* tag 时:创建 GitHub Release 并附带各平台产物
# (CLI 二进制 + 桌面安装包)。使用内置 GITHUB_TOKEN,无需 PAT。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. 创建（或复用）Release ───────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      # Release notes = this version's CHANGELOG section + a Downloads/footer block.
      # Single source of truth: curated notes live in CHANGELOG.md, not duplicated here.
      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          notes="$(mktemp)"
          # Print the section under "## [<tag>]" up to the next "---" or next "## [" heading.
          # Literal index() matching avoids awk regex-metachar pitfalls with [ ] and dots.
          awk -v tag="$tag" '
            index($0, "## [" tag "]") == 1 { inblk=1; next }
            inblk && ($0 == "---" || index($0, "## [") == 1) { exit }
            inblk { print }
          ' CHANGELOG.md > "$notes" || true
          if [ ! -s "$notes" ]; then
            printf 'Vigils %s — a local-first control plane for AI agents.\n' "$tag" > "$notes"
          fi
          {
            printf '\n---\n\n'
            printf '%s\n\n' '**Downloads.** Desktop installers (Windows `.exe` / `.msi`, macOS `.dmg`, Linux `.AppImage` / `.deb` / `.rpm`) and CLI binaries (`vigil-hub`, `vigil-native-host`) are attached below. The Chrome MV3 extension lives in `extensions/chrome-mv3/`.'
            printf '%s\n\n' 'Early releases are unsigned; your OS may show a Gatekeeper / SmartScreen prompt on first run.'
            printf '%s\n' 'Apache-2.0 · https://vigils.ai'
          } >> "$notes"
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Vigils ${{ steps.resolve.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: ${{ steps.notes.outputs.path }}

  # ── 2. CLI 二进制（3 平台）───────────────────────────────────────────
  cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  suffix: "",     archive: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,      suffix: "",     archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    suffix: ".exe", archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (keyring / secret-service)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev

      - name: Build CLI binaries
        run: cargo build --release --bin vigil-hub -p vigil-hub-cli --bin vigil-native-host -p vigil-native-host

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          mkdir -p dist
          tar -C target/release -czf "dist/vigils-cli-${{ matrix.target }}.tar.gz" vigil-hub vigil-native-host
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/vigil-hub.exe, target/release/vigil-native-host.exe -DestinationPath "dist/vigils-cli-${{ matrix.target }}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: dist/vigils-cli-${{ matrix.target }}.${{ matrix.archive }}

  # ── 3. 桌面安装包（3 平台,Tauri bundle）─────────────────────────────
  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libdbus-1-dev pkg-config libssl-dev

      # 显式 cargo tauri build —— 不用 tauri-action 的前端自动探测(projectPath
      # apps/desktop 无 package.json,前端在 ui/,自动 install 会失败)。
      # beforeBuildCommand 已自包含(npm --prefix ui),tauri build 会调它构建前端。
      - name: Build frontend (beforeBuildCommand is empty — build dist explicitly)
        working-directory: apps/desktop/ui
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build desktop bundles
        working-directory: apps/desktop
        run: cargo tauri build --features gui

      # always(): 单个 bundle target(如某平台 rpm)失败不应拖垮整步,
      # 让已成功产出的其他安装包仍能上传(matrix 已 fail-fast: false)。
      - name: Upload desktop bundles
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
