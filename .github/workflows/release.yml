name: Release

# 推送 v* tag 时:创建 GitHub Release 并附带各平台产物
# (CLI 二进制 + 桌面安装包)。使用内置 GITHUB_TOKEN,无需 PAT。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  # D25:build provenance attestation(actions/attest-build-provenance)需 OIDC token 换 Sigstore
  # 签名 + 写 attestation。让发布产物可 `gh attestation verify <file> --repo duncatzat/vigils`
  # 校验"由官方 CI 从官方源构建"(SLSA provenance,无需自管密钥),关闭"release 被替换"风险。
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. 创建（或复用）Release ───────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # 版本一致性守门(D21 发现:apps/desktop/tauri.conf.json 有**独立** version 字段,
      # 每次发版须与 workspace Cargo.toml 同步 bump,易漏 → 桌面安装包/OTA manifest 版本漂移
      # [v0.1.26 即漏 bump tauri 致桌面包标 0.1.25])。在创建 Release 前断言三者一致,早失败。
      - name: Verify version consistency (tag == Cargo.toml == tauri.conf.json)
        shell: bash
        run: |
          set -euo pipefail
          want="${{ steps.resolve.outputs.tag }}"; want="${want#v}"
          cargo_v=$(grep -m1 -E '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          tauri_v=$(grep -m1 -E '"version"' apps/desktop/tauri.conf.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          echo "tag=$want  Cargo.toml=$cargo_v  tauri.conf.json=$tauri_v"
          if [ "$cargo_v" != "$want" ] || [ "$tauri_v" != "$want" ]; then
            echo "::error::version drift — tag '$want' vs Cargo.toml '$cargo_v' vs tauri.conf.json '$tauri_v' must all match; bump all three before tagging."
            exit 1
          fi

      # ISS-20260621-006: two release-killing drifts the 3-way gate above does NOT catch — they
      # otherwise fail LATE (dependency resolution / desktop build) AFTER the Release object exists.
      # Fail fast here, before the release is created.
      - name: Verify inter-crate pins + Tauri Rust/npm alignment
        shell: bash
        run: |
          set -euo pipefail
          want="${{ steps.resolve.outputs.tag }}"; want="${want#v}"
          # (1) inter-crate path-dep version pins must equal the workspace version — they are NOT
          # auto-tracked, and a stale pin breaks pre-release dependency resolution (bit v0.2.1-rc.1).
          bad=0
          while IFS= read -r line; do
            v=$(printf '%s' "$line" | sed -E 's/.*version *= *"([^"]+)".*/\1/')
            if [ "$v" != "$want" ]; then echo "  stale pin (want $want): $line"; bad=1; fi
          done < <(grep -rhE 'path *=' crates/*/Cargo.toml apps/*/Cargo.toml 2>/dev/null | grep -E 'version *= *"' || true)
          if [ "$bad" = 1 ]; then
            echo "::error::inter-crate path-dep version pin(s) not at $want — bump every pin with the version (docs/releasing-gotchas.md)."
            exit 1
          fi
          # (2) the Tauri Rust crate (Cargo.lock) and npm @tauri-apps/api must share major.minor, else
          # `cargo tauri build` refuses to build (bit the desktop job when cargo update drifted 2.10->2.11).
          rust_tauri=$(grep -A1 '^name = "tauri"$' Cargo.lock | grep -m1 '^version = ' | sed -E 's/.*"([0-9]+\.[0-9]+)\..*/\1/')
          npm_tauri=$(grep -m1 '"@tauri-apps/api"' apps/desktop/ui/package.json | sed -E 's/.*"[~^]?([0-9]+\.[0-9]+)\..*/\1/')
          echo "inter-crate pins OK at $want; tauri Rust=$rust_tauri npm @tauri-apps/api=$npm_tauri"
          if [ "$rust_tauri" != "$npm_tauri" ]; then
            echo "::error::Tauri Rust ($rust_tauri) vs npm @tauri-apps/api ($npm_tauri) major.minor mismatch — cargo tauri build will refuse. Run: npm --prefix apps/desktop/ui install @tauri-apps/api@^$rust_tauri @tauri-apps/cli@^$rust_tauri."
            exit 1
          fi

      # Release notes = English CHANGELOG section + a clearly-separated Chinese section
      # (never interleaved) + Downloads/footer. Single source of truth: the curated notes
      # live in CHANGELOG.md / CHANGELOG.zh-CN.md, not duplicated here.
      - name: Build release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          notes="$(mktemp)"
          # Extract the section under "## [<tag>]" up to the next "---" or next "## [" heading.
          # Literal index() matching avoids awk regex-metachar pitfalls with [ ] and dots.
          extract() {
            awk -v tag="$tag" '
              index($0, "## [" tag "]") == 1 { inblk=1; next }
              inblk && ($0 == "---" || index($0, "## [") == 1) { exit }
              inblk { print }
            ' "$1"
          }
          # English body (authoritative).
          extract CHANGELOG.md > "$notes" || true
          if [ ! -s "$notes" ]; then
            printf 'Vigils %s — a local-first control plane for AI agents.\n' "$tag" > "$notes"
          fi
          # Chinese as a clearly-separated section (never interleaved).
          zh="$(extract CHANGELOG.zh-CN.md 2>/dev/null || true)"
          if [ -n "$zh" ]; then
            { printf '\n---\n\n## 中文\n\n'; printf '%s\n' "$zh"; } >> "$notes"
          fi
          {
            printf '\n---\n\n'
            printf '%s\n\n' '### Downloads — which file do I want?'
            printf '%s\n' '- **Desktop app** (most users): the installer for your OS — Windows `Vigils_*_x64-setup.exe` (or `.msi`), macOS `Vigils_*.dmg`, Linux `.AppImage` / `.deb` / `.rpm`. Gives you the GUI: Activity Feed, Approval Queue, Server Registry.'
            printf '%s\n' '- **CLI gateway** (put Vigils in front of an AI agent — Claude Code / Codex / Cursor / Zed): `vigils-cli-<platform>` (contains `vigil-hub` + `vigil-native-host`). This is the MCP proxy your agent connects to.'
            printf '%s\n' '- **Browser extension** (guard pasting/typing secrets into AI web apps, Chrome MV3): `vigils-chrome-extension.zip` — unzip, then load unpacked at `chrome://extensions`.'
            printf '%s\n\n' '- The `.sig` and `Vigils.app.tar.gz` files are desktop auto-updater artifacts — you do not need to download them.'
            printf '%s\n\n' 'New here? Full setup & agent-integration guide: https://duncatzat.github.io/vigils'
            printf '%s\n' 'Every asset carries **Sigstore build provenance** (SLSA) — verify any download came from this repo'"'"'s official CI with:'
            printf '%s\n\n' '`gh attestation verify <file> --repo duncatzat/vigils`. (Not yet OS-code-signed — Authenticode/notarization — so your OS may still show a Gatekeeper / SmartScreen prompt on first run.)'
            printf '%s\n' 'Apache-2.0 · https://vigils.ai · [Full changelog](https://github.com/duncatzat/vigils/blob/main/CHANGELOG.md)'
          } >> "$notes"
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Vigils ${{ steps.resolve.outputs.tag }}
          # ISS-20260621-005: create as DRAFT; the `finalize` job flips it to published only after
          # every build job succeeds, so a failed build never leaves a public partial release.
          draft: true
          # pre-release tags (e.g. v0.2.0-beta.1, v0.2.0-rc.1) carry a `-`; mark them as
          # pre-release on GitHub so a beta isn't listed as the latest stable. A final tag
          # (v0.2.0) has no `-` and is published as a normal release.
          prerelease: ${{ contains(steps.resolve.outputs.tag, '-') }}
          generate_release_notes: false
          body_path: ${{ steps.notes.outputs.path }}

  # ── 2. CLI 二进制（3 平台）───────────────────────────────────────────
  cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # plat = 面向用户的友好平台名(替代 Rust target triple,新用户更易辨认下载哪个)
          # ★ D21:linux CLI 改用 **cargo-zigbuild 锁 glibc 2.17 地板**(target x86_64-unknown-linux-gnu.2.17),
          #   根治 D15 的 glibc 墙。背景:此前 ubuntu-22.04 构建(glibc 2.35,二进制实际需 GLIBC_2.34)在更老
          #   发行版上仍 `version GLIBC_2.xx not found` 跑不起来 = 采用毒药 —— Ubuntu≤20.04(2.31)/ Debian≤11
          #   (2.31)/ RHEL 7-8(2.17-2.28)/ Amazon Linux 2(2.26)全中招。zig 作交叉链接器把 glibc 符号下沉到
          #   2.17(manylinux2014 同款地板,覆盖近十年几乎所有 glibc 发行版),**零代码改动、功能不减**(keyring/
          #   libdbus 仍动态链,但对老 glibc 符号)。构建后有 objdump 守门断言地板≤2.17,zigbuild 失灵则整 leg 失败。
          #   仍跑在 ubuntu-22.04(zig 自带多版本 glibc sysroot,runner OS 不再决定地板)。mac/win 保持 native
          #   cargo build。bindir:zigbuild 带 --target 时产物落 target/<triple>/release(native build 落 target/release)。
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  plat: linux-x64,   suffix: "",     archive: tar.gz, bindir: "target/x86_64-unknown-linux-gnu/release" }
          - { os: macos-latest,   target: aarch64-apple-darwin,      plat: macos-arm64, suffix: "",     archive: tar.gz, bindir: "target/release" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    plat: windows-x64, suffix: ".exe", archive: zip,    bindir: "target/release" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (keyring / secret-service)
        # robust:按 runner OS 判定而非钉死版本字符串(改 runner 版本不漏装 = 不静默断 keyring 链)。
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev

      # D21:zig 作交叉链接器,把 Linux CLI 的 glibc 符号下沉到 2.17 地板(见 matrix 注释)。
      # ziglang(pip 包,自带 zig 编译器)+ cargo-zigbuild(cargo subcommand,自动探测 `python -m ziglang`)。
      # 版本钉死保证可复现;仅 Linux leg 需要。
      - name: Install zig + cargo-zigbuild (Linux glibc 2.17 floor)
        if: runner.os == 'Linux'
        run: |
          pip3 install ziglang==0.13.0
          cargo install cargo-zigbuild --version 0.19.8 --locked

      - name: Build CLI binaries (Linux — zigbuild glibc 2.17 floor)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17 --bin vigil-hub -p vigil-hub-cli --bin vigil-native-host -p vigil-native-host

      - name: Build CLI binaries (macOS / Windows — native)
        if: runner.os != 'Linux'
        run: cargo build --release --bin vigil-hub -p vigil-hub-cli --bin vigil-native-host -p vigil-native-host

      # D21 守门:zigbuild 若失灵(地板未下沉),objdump 断言 fail 整 leg,杜绝静默发回高 glibc 二进制。
      # sort -V 把 max 符号与 GLIBC_2.17 比较:并入后版本升序排,若 tail(最大)仍是 2.17 则 max≤2.17 通过。
      # Codex D21 加固:objdump 缺失/读失败时绝不静默通过(否则守门形同虚设)——显式核 objdump 存在 +
      # 二进制存在 + objdump 输出单独捕获(其失败经 set -e 终止,不被后续管道状态掩盖)。
      - name: Verify glibc floor <= 2.17 (any-distro reach guard)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          command -v objdump >/dev/null 2>&1 || { echo "::error::objdump not available — cannot verify glibc floor"; exit 1; }
          for bin in vigil-hub vigil-native-host; do
            path="${{ matrix.bindir }}/$bin"
            [ -f "$path" ] || { echo "::error::binary not found: $path"; exit 1; }
            dump=$(objdump -T "$path")
            # grep 无匹配(纯静态二进制)合法 → ||true 容忍;gnu 动态链接二进制必含 GLIBC_ 符号。
            max=$(printf '%s\n' "$dump" | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V | tail -1 || true)
            echo "$bin max GLIBC symbol: ${max:-none}"
            if [ -n "$max" ] && [ "$(printf '%s\nGLIBC_2.17\n' "$max" | sort -V | tail -1)" != "GLIBC_2.17" ]; then
              echo "::error::glibc floor regression: $bin requires $max (> GLIBC_2.17)"
              exit 1
            fi
          done

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          mkdir -p dist
          tar -C "${{ matrix.bindir }}" -czf "dist/vigils-cli-${{ matrix.plat }}.tar.gz" vigil-hub vigil-native-host
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ matrix.bindir }}/vigil-hub.exe", "${{ matrix.bindir }}/vigil-native-host.exe" -DestinationPath "dist/vigils-cli-${{ matrix.plat }}.zip"

      # D22:为每个 CLI 资产发布 `<asset>.sha256`,供一行安装器 install.sh 校验下载完整性
      # (随 release 发布的 SHA-256,检测传输损坏/篡改;非独立离线签名)。格式 `<hash>  <file>`,
      # 与 install.sh 的 `cut -d' ' -f1` 解析对齐。shasum -a 256 在 Linux+macOS 都有。
      - name: Checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          cd dist
          shasum -a 256 "vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}" > "vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}.sha256"
      - name: Checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $f = "vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}"
          $h = (Get-FileHash -Algorithm SHA256 "dist/$f").Hash.ToLower()
          Set-Content -Path "dist/$f.sha256" -Value "$h  $f" -Encoding ascii

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: true # ISS-005: stay draft until `finalize` publishes after all builds pass
          files: |
            dist/vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}
            dist/vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}.sha256

      # D25:为这条 leg 的 CLI 压缩包生成 SLSA build provenance(每平台一条 attestation)。
      # 用户可 `gh attestation verify vigils-cli-<plat>.<ext> --repo duncatzat/vigils` 校验来源。
      - name: Attest build provenance (CLI)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/vigils-cli-${{ matrix.plat }}.${{ matrix.archive }}

  # ── 2b. CLI ML 变体（3 平台,--features ort + 捆 onnxruntime 1.24.4 dylib）──────
  # 加性资产:**不动**默认硬指纹件(cli job)。ML 变体 = vigil-hub --features ort + exe 同目录
  # onnxruntime 1.24.4 dylib(运行期 prepare_ort_dylib_path 自动 dlopen)。用户
  # `vigil-hub serve --engine ml` 首跑按需下载 OpenAI PII + DeBERTa 模型(HF 主源 + vigils.ai
  # 镜像 fallback)。资产名 vigils-cli-ml-<plat>,与默认 vigils-cli-<plat> 并存。
  # ★ 真机验证(2026-06-21):Linux x64 / macOS arm64 / Windows x64 三平台 onnxruntime 1.24.4
  #   dylib dlopen + 真 PII/DeBERTa 推理全绿。glibc 地板:ML Linux 由 onnxruntime manylinux_2_28
  #   wheel 决定 ≈ 2.28(高于默认件 zigbuild 的 2.17 —— ML 为可选高级件,可接受);macOS 需 14+
  #   (wheel macosx_14_0)。zigbuild 仍把 vigil-hub 二进制本身的 glibc 符号下沉到 2.17(不额外抬高地板)。
  cli-ml:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   plat: linux-x64,   archive: tar.gz, bindir: "target/x86_64-unknown-linux-gnu/release", pip_platform: "manylinux_2_28_x86_64" }
          - { os: macos-latest,   plat: macos-arm64, archive: tar.gz, bindir: "target/release",                          pip_platform: "macosx_14_0_arm64" }
          - { os: windows-latest, plat: windows-x64, archive: zip,    bindir: "target/release",                          pip_platform: "win_amd64" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (keyring / secret-service)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev

      - name: Install zig + cargo-zigbuild (Linux glibc floor)
        if: runner.os == 'Linux'
        run: |
          pip3 install ziglang==0.13.0
          cargo install cargo-zigbuild --version 0.19.8 --locked

      # vigil-hub --features ort(ort load-dynamic:编译期不链 dylib,运行期 dlopen)。仅 vigil-hub
      # (ML 用于 serve/firewall;vigil-native-host 是浏览器 native messaging,与 ML 无关,不打包)。
      - name: Build vigil-hub --features ort (Linux — zigbuild glibc 2.17 floor)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17 --features ort --bin vigil-hub -p vigil-hub-cli
      - name: Build vigil-hub --features ort (macOS / Windows — native)
        if: runner.os != 'Linux'
        run: cargo build --release --features ort --bin vigil-hub -p vigil-hub-cli

      # onnxruntime 1.24.4 native dylib(ort api-24 ABI 必须 1.24.x)。**直接从 PyPI JSON API 取对应
      # 平台 wheel URL 并 curl**,不靠 `pip download` 解析 —— ubuntu runner 的 python 版本可能没有
      # 1.24.4 兼容 wheel(pip 报 "No matching distribution",只解到 1.23.2);win/mac runner 凑巧能解到。
      # runner python 只用 urllib(取 JSON)+ zipfile(解 wheel),与 python 版本无关;curl 取 wheel。
      # wheel 内 capi/ 的 native lib 与 cp 标签无关,取 cp312 + matrix.pip_platform 那一个;排除
      # pybind11/cpython python 绑定,只留 onnxruntime 运行库(主 lib + providers_shared)。
      - name: Fetch onnxruntime 1.24.4 dylib (PyPI wheel)
        shell: bash
        run: |
          set -euo pipefail
          PY=$(command -v python || command -v python3)
          meta=$("$PY" -c "import urllib.request,json; d=json.load(urllib.request.urlopen('https://pypi.org/pypi/onnxruntime/1.24.4/json')); f=next(f for f in d['urls'] if f['filename'].endswith('.whl') and '${{ matrix.pip_platform }}' in f['filename'] and 'cp312' in f['filename']); print(f['url'], f['digests']['sha256'])")
          url=${meta%% *}; sha=${meta##* }
          echo "onnxruntime wheel: $url (sha256 $sha)"
          mkdir -p ort-wheel
          curl -sSL --fail --retry 3 -o ort-wheel/ort.whl "$url"
          # fail-closed:校验 wheel sha256 对账 PyPI 摘要,污染/损坏的下载不进签名 release 产物
          "$PY" -c "import hashlib,sys; got=hashlib.sha256(open('ort-wheel/ort.whl','rb').read()).hexdigest(); sys.exit(0 if got=='$sha' else 'wheel sha256 MISMATCH: %s != %s'%(got,'$sha'))"
          cd ort-wheel
          "$PY" -c "import zipfile,os; z=zipfile.ZipFile('ort.whl'); [open(os.path.basename(n),'wb').write(z.read(n)) for n in z.namelist() if 'capi/' in n and not n.endswith('/') and any(e in n for e in ('.so','.dylib','.dll')) and 'pybind11' not in n and 'cpython' not in n]"
          ls -la

      # vigil-hub + onnxruntime 主库 → mlpkg/,dylib 用 prepare_ort_dylib_path 期望的 exe 同目录
      # 规范名(win onnxruntime.dll / mac libonnxruntime.dylib / linux libonnxruntime.so)。
      - name: Stage ML payload (binary + exe-adjacent dylib)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p mlpkg
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "${{ matrix.bindir }}/vigil-hub.exe" mlpkg/
            cp ort-wheel/onnxruntime.dll mlpkg/
            cp ort-wheel/onnxruntime_providers_shared.dll mlpkg/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp "${{ matrix.bindir }}/vigil-hub" mlpkg/
            cp ort-wheel/libonnxruntime.*.dylib mlpkg/libonnxruntime.dylib
          else
            cp "${{ matrix.bindir }}/vigil-hub" mlpkg/
            cp ort-wheel/libonnxruntime.so.* mlpkg/libonnxruntime.so
          fi
          ls -la mlpkg

      - name: Package ML (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          mkdir -p dist
          tar -C mlpkg -czf "dist/vigils-cli-ml-${{ matrix.plat }}.tar.gz" .
      - name: Package ML (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "mlpkg/*" -DestinationPath "dist/vigils-cli-ml-${{ matrix.plat }}.zip"

      - name: Checksum ML (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          cd dist
          shasum -a 256 "vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}" > "vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}.sha256"
      - name: Checksum ML (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $f = "vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}"
          $h = (Get-FileHash -Algorithm SHA256 "dist/$f").Hash.ToLower()
          Set-Content -Path "dist/$f.sha256" -Value "$h  $f" -Encoding ascii

      - name: Upload ML to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: true # ISS-005: stay draft until `finalize` publishes after all builds pass
          files: |
            dist/vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}
            dist/vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}.sha256

      - name: Attest build provenance (ML CLI)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/vigils-cli-ml-${{ matrix.plat }}.${{ matrix.archive }}

  # ── 3. 桌面安装包（3 平台,Tauri bundle）─────────────────────────────
  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  plat: linux-x86_64 }
          - { os: macos-latest,   plat: darwin-aarch64 }
          - { os: windows-latest, plat: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    # OTA updater signing — set repo secret TAURI_SIGNING_PRIVATE_KEY (content of the
    # Tauri minisign private key) to produce signed updater artifacts + per-platform
    # manifests. Absent → plain installers, no OTA; the release still succeeds (the
    # updater steps below are guarded on the key being present).
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      # Pre-release tags (containing '-') build NSIS-only on Windows — see build steps.
      REL_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libdbus-1-dev pkg-config libssl-dev

      # 显式 cargo tauri build —— 不用 tauri-action 的前端自动探测(projectPath
      # apps/desktop 无 package.json,前端在 ui/,自动 install 会失败)。
      # beforeBuildCommand 已自包含(npm --prefix ui),tauri build 会调它构建前端。
      - name: Build frontend (beforeBuildCommand is empty — build dist explicitly)
        working-directory: apps/desktop/ui
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # createUpdaterArtifacts is enabled ONLY when the signing key is present (otherwise
      # the build would fail demanding a key). Two guarded steps keep no-secret releases
      # working unchanged. shell: bash for uniform --config JSON quoting across OSes.
      - name: Build desktop bundles (signed + updater artifacts)
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        working-directory: apps/desktop
        shell: bash
        run: |
          # WiX/MSI rejects a non-numeric pre-release identifier (e.g. beta.1 — it demands
          # numeric-only, <= 65535). A pre-release tag (contains '-') therefore builds
          # NSIS-only on Windows (still produces the OTA updater artifact + .sig); stable
          # tags and every other platform keep the conf default targets (Windows=nsis+msi).
          extra=""
          if [[ "$RUNNER_OS" == "Windows" && "$REL_TAG" == *-* ]]; then
            extra=',"targets":["nsis"]'
          fi
          cargo tauri build --features gui --config "{\"bundle\":{\"createUpdaterArtifacts\":true${extra}}}"

      - name: Build desktop bundles (no signing key — plain installers)
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        working-directory: apps/desktop
        shell: bash
        run: |
          # Same MSI pre-release constraint as the signed step above.
          extra=""
          if [[ "$RUNNER_OS" == "Windows" && "$REL_TAG" == *-* ]]; then
            extra=" --bundles nsis"
          fi
          cargo tauri build --features gui$extra

      # always(): 单个 bundle target(如某平台 rpm)失败不应拖垮整步,
      # 让已成功产出的其他安装包仍能上传(matrix 已 fail-fast: false)。
      - name: Upload desktop bundles
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: true # ISS-005: stay draft until `finalize` publishes after all builds pass
          files: |
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*-setup.exe.sig
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app.tar.gz
            target/release/bundle/**/*.app.tar.gz.sig
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.AppImage.sig
            target/release/bundle/**/*.AppImage.tar.gz
            target/release/bundle/**/*.AppImage.tar.gz.sig

      # D25:为本平台的桌面安装包生成 build provenance(.exe/.msi/.dmg/.deb/.rpm/.AppImage;
      # 不含 .sig 更新器签名——那是签名非构建产物)。continue-on-error:provenance 是增值,
      # 任一平台 glob 不匹配 / attest 异常都不阻塞已上传的安装包。
      - name: Attest build provenance (desktop installers)
        if: always()
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage

      # OTA: generate this platform's updater manifest (latest-<plat>.json) pointing at the
      # signed artifact's GitHub release URL, then upload it as a release asset. The
      # vigils.ai mirror's ota-sync pulls these → /desktop-updates/<plat>/latest.json.
      - name: Generate OTA updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: bash
        run: node scripts/gen-updater-manifest.mjs "${{ needs.create-release.outputs.tag }}" "${{ matrix.plat }}" target/release/bundle "${{ github.repository }}" "Vigils ${{ needs.create-release.outputs.tag }}"

      - name: Upload OTA updater manifest
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: true # ISS-005: stay draft until `finalize` publishes after all builds pass
          files: latest-${{ matrix.plat }}.json

  # ── 4. Chrome MV3 扩展（zip,供用户 load unpacked）──────────────────────
  extension:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Chrome MV3 extension
        run: |
          set -e
          mkdir -p dist
          # 顶层保留 chrome-mv3/ 便于解压后直接 load unpacked;排除点文件 / node_modules
          (cd extensions && zip -r "../dist/vigils-chrome-extension.zip" chrome-mv3 -x '*/.*' '*/node_modules/*')
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: true # ISS-005: stay draft until `finalize` publishes after all builds pass
          files: dist/vigils-chrome-extension.zip

      # D25:为浏览器扩展 zip 生成 build provenance。
      - name: Attest build provenance (extension)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/vigils-chrome-extension.zip

  # ── 6. Finalize ───────────────────────────────────────────────────────────
  # ISS-20260621-005: publish the release (draft -> public) ONLY after every build job succeeded.
  # If any build fails this job is skipped (needs: all builds) and the release stays a draft, so a
  # failed build never leaves a public release with missing/partial assets. Mirrors — and now
  # enforces in CI — the manual rc-then-promote discipline in docs/releasing-gotchas.md.
  finalize:
    needs: [create-release, cli, cli-ml, desktop, extension]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release after all builds succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.create-release.outputs.tag }}"
          # pre-release tags carry a `-` (e.g. v0.2.2-rc.1) → mark prerelease, not Latest.
          if [[ "$tag" == *-* ]]; then pre=true; latest=false; else pre=false; latest=true; fi
          echo "publishing $tag (prerelease=$pre, latest=$latest)"
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease="$pre" --latest="$latest"
