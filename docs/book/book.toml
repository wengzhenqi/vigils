[book]
title = "Vigils — Local AI Agent Control Plane"
authors = ["Vigils Project Contributors"]
description = "User guide for Vigils — local-first AI Agent control plane: action firewall, audit ledger, privacy filter, MCP hub, approval queue."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/duncatzat/vigils"
edit-url-template = "https://github.com/duncatzat/vigils/edit/main/docs/book/src/{path}"
# GitHub Pages project site path (https://duncatzat.github.io/vigils/).
site-url = "/vigils/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
