<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vigils</title>
  <!--
    I09b-α3 popup:展示最近 findings(origin / event_kind / action / findings)。
    不拉原文(ADR §I-9.1),数据 in-memory 只活 SW 生命周期内。
    CSP `script-src 'self'` 严格;所有 JS 在外链 popup.js,无 inline script。
  -->
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div>
      <h1>Vigils</h1>
      <span class="subtitle">paste/input/submit 保护</span>
    </div>
    <span id="status-pill" class="status-pill" aria-label="保护状态">
      <span class="status-dot"></span>
      <span id="status-label">保护中</span>
    </span>
  </header>

  <section class="actions">
    <div class="actions-main">
      <div class="count-block">
        <span class="count-title">最近记录</span>
        <span id="count-label" class="count-label">0 条</span>
      </div>
      <button id="refresh-btn" type="button" title="刷新最近记录和当前状态">刷新</button>
      <button id="clear-btn" type="button" title="清空 in-memory 最近记录">清空</button>
      <a id="options-link" href="#" title="打开扩展选项页">选项</a>
    </div>
    <div class="tier-switch" aria-label="保护档位">
      <div class="tier-buttons" role="group" aria-label="快速切换保护档位">
        <button type="button" class="tier-btn" data-tier="strict">strict</button>
        <button type="button" class="tier-btn" data-tier="balanced">balanced</button>
        <button type="button" class="tier-btn" data-tier="recall-first">recall-first</button>
      </div>
      <span id="tier-hint" class="tier-hint" aria-live="polite"></span>
    </div>
  </section>

  <!-- α4 session-scoped 豁免(仅当前 tab + origin);用户主动放行的逃生阀 -->
  <section class="exempt-section">
    <div id="exempt-status" class="exempt-status">
      <span id="exempt-label">当前页面保护中</span>
      <span id="exempt-remaining" class="exempt-remaining"></span>
    </div>
    <div class="exempt-actions">
      <button id="exempt-5m-btn" type="button" title="豁免当前页 5 分钟">豁免 5m</button>
      <button id="exempt-10m-btn" type="button" title="豁免当前页 10 分钟(上限)">豁免 10m</button>
      <button id="exempt-clear-btn" type="button" class="hidden" title="立即结束豁免">结束豁免</button>
    </div>
  </section>

  <section id="findings-section" aria-live="polite">
    <div id="empty-hint" class="empty-hint">
      尚无记录 —— 触发 paste 或 submit 后即可看到。
      若所有记录都是 <code>block</code> 且错误含 <code>host_disconnected</code>,请先
      <a id="install-hint" href="#">注册 Native Host</a>。
    </div>
    <ul id="findings-list" class="findings-list hidden" role="list"></ul>
  </section>

  <footer>
    <small>
      原文仅在本机 Native Host 内存停留,分类完立即 drop(ADR 0009 §I-9.1)。
    </small>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
